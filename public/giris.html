<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Yüzme Kurs Yönetim Sistemi - Giriş</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/premium-system.css">
    <link rel="stylesheet" href="css/mobile-compact.css">
    <link rel="stylesheet" href="css/landing-premium.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-box">
            <h1>🏊 Yüzme Kurs</h1>
            <h2>Yönetim Sistemi</h2>

            <div class="error-message" id="errorMessage"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">E-mail:</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="password">Şifre:</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <button type="submit" class="btn btn-primary">Giriş Yap</button>
            </form>

            <p class="login-info">Sistem Rolü: <span id="roleInfo">Kontrol ediliyor...</span></p>
        </div>
    </div>

    <!-- Firebase Scripts -->
    <script defer src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>

    <script defer src="js/config.js"></script>
    <script defer src="js/auth.js"></script>
</body>
</html>
